server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: metamong-batch
  profiles:
    active: local
  main:
    web-application-type: none
    
  # Spring Batch Configuration
  batch:
    job:
      enabled: false  # Disable auto job execution
    jdbc:
      initialize-schema: ALWAYS
      schema: classpath:org/springframework/batch/core/schema-mysql.sql
      
  # Spring Task Configuration
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 30s
        
  # Lifecycle Configuration
  lifecycle:
    timeout-per-shutdown-phase: 120s
    
  # Database Configuration
  datasource:
    document:
      database: metamong
      primary:
        uri: ${database.document.primary.uri}
      secondary:
        uri: ${database.document.secondary.uri}
    aurora:
      master:
        hikari:
          jdbc-url: ${spring.datasource.aurora.master.hikari.jdbc-url:}
          username: ${spring.datasource.aurora.master.hikari.username:}
          password: ${spring.datasource.aurora.master.hikari.password:}
          driver-class-name: com.mysql.cj.jdbc.Driver
          minimum-idle: 2
          maximum-pool-size: 10
          idle-timeout: 295000
          max-lifetime: 300000
          connection-timeout: 180000
          connection-test-query: select 1
      slave:
        hikari:
          jdbc-url: ${spring.datasource.aurora.slave.hikari.jdbc-url:}
          username: ${spring.datasource.aurora.slave.hikari.username:}
          password: ${spring.datasource.aurora.slave.hikari.password:}
          driver-class-name: com.mysql.cj.jdbc.Driver
          minimum-idle: 2
          maximum-pool-size: 10
          idle-timeout: 295000
          max-lifetime: 300000
          connection-timeout: 180000
          connection-test-query: select 1

  # JPA Configuration  
  jpa:
    hibernate:
      ddl-auto: none # TODO : 개발 시에만 update로 설정
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}



# OpenSearch Configuration
opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:9200}
  username: ${OPENSEARCH_USERNAME:}
  password: ${OPENSEARCH_PASSWORD:}
  connect-to-live-seconds: 60
  index:
    board-contents: board_contents
    user-tag-histories: user_tag_histories
    displays: displays
    users: users
    reviews: product_reviews

# Firebase Configuration
firebase:
  fcm:
    account-key: ${FIREBASE_FCM_ACCOUNT_KEY:}

# AWS Configuration
aws:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    bucket: ${AWS_S3_BUCKET:metamong-storage}
    region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    region: ${AWS_BEDROCK_REGION:us-east-1}

# Public Data API Configuration
public-data:
  api:
    base-url: ${PUBLIC_DATA_API_URL:https://apis.data.go.kr}
    service-key: ${PUBLIC_DATA_SERVICE_KEY:your-service-key}
    timeout: 30000
    retry-count: 3

# Batch Job Scheduling
batch:
  scheduling:
    enabled: ${BATCH_SCHEDULING_ENABLED:true}
    cron:
      daily-job: "0 0 2 * * ?" # 매일 오전 2시
      weekly-job: "0 0 3 * * 1" # 매주 월요일 오전 3시

# Job Configuration
job:
  restart-execution-id: ${JOB_RESTART_EXECUTION_ID:0}

# Logging Configuration
logging:
  level:
    root: INFO
    com.metamong: DEBUG
    org.springframework.batch: DEBUG
    com.zaxxer.hikari: DEBUG
    org.springframework.transaction: INFO
    org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{dd.trace_id}] [%X{dd.span_id}] [%-5level] [%logger{36}.%M] - [%msg]%n"

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,batch
  endpoint:
    health:
      show-details: always