server:
  port: 8080

spring:
  application:
    name: metamong-server
  profiles:
    active: local

  data:
    redis:
      url: ${REDIS_URL}
  
  # Database Configuration - MySQL
  datasource:
    url: ${JDBC_URL:}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 295000
      max-lifetime: 300000
      connection-timeout: 180000
    document:
      database: metamong
      primary:
        uri: ${MONGO_PRIMARY_URL}
      secondary:
        uri: ${MONGO_SECONDARY_URL}

  # JPA Configuration  
  jpa:
    hibernate:
      ddl-auto: none # TODO : 개발 시에만 update로 설정
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false



# Logging Configuration
logging:
  level:
    root: INFO
    com.metamong: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never