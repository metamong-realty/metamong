server:
  port: 8080

spring:
  application:
    name: metamong-server
  profiles:
    active: local
  
  # Database Configuration - MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/metamong?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration  
  jpa:
    hibernate:
      ddl-auto: none # TODO : 개발 시에만 update로 설정
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/metamong_realestateinfo}

# Logging Configuration
logging:
  level:
    root: INFO
    com.metamong: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always