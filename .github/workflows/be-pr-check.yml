name: 💚 BE PR Check

on:
  pull_request:
    branches:
      - back-deploy
      - back-batch-deploy
    paths:
      - 'back/**'
      - '!back/**/README.md'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: 🔨 Compile Kotlin
        run: ./gradlew :back:server:compileKotlin --no-daemon
      
      - name: 🔨 Build
        run: ./gradlew :back:server:build -x test --no-daemon
      
      - name: 🧪 Run Tests
        run: ./gradlew :back:server:test --no-daemon
      
      - name: ✨ ktlint Check
        run: ./gradlew :back:server:ktlintCheck --no-daemon
        continue-on-error: true
      
      - name: 📊 Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: back/server/build/test-results/test/*.xml
          reporter: java-junit
