name: 💛 FE PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'front/**'
      - '!front/**/README.md'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      
      - name: Install dependencies
        working-directory: front
        run: npm ci
      
      - name: 🔨 Build
        working-directory: front
        run: npm run build
      
      - name: 🧪 Run Tests
        working-directory: front
        run: npm test -- --passWithNoTests
        continue-on-error: true
      
      - name: ✨ Lint Check
        working-directory: front
        run: npm run lint
        continue-on-error: true
      
      - name: 📦 Type Check
        working-directory: front
        run: npx tsc --noEmit
        continue-on-error: true
